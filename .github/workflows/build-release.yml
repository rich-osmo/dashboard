name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  build-dmg:
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Build frontend
        run: |
          cd app/frontend
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt
          pip install pyinstaller pywebview

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build app with PyInstaller
        run: |
          APP_VERSION=${{ steps.version.outputs.version }} \
          pyinstaller dashboard.spec --clean --noconfirm

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Personal Dashboard" \
            --volicon "Dashboard.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Dashboard.app" 175 190 \
            --hide-extension "Dashboard.app" \
            --app-drop-link 425 190 \
            "dist/PersonalDashboard-${{ steps.version.outputs.version }}-macOS.dmg" \
            "dist/Dashboard.app" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PersonalDashboard-*.dmg
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
